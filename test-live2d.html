<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live2D Test v8 — Fixed Image Hook + Canvas Snapshot</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f5f5f5; min-height: 120vh; }
    #log { padding: 10px; margin: 10px 0; border-radius: 4px; background: #fff; border: 1px solid #ddd; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #0074d9; } .warn { color: #ff851b; } .section { color: #b10dc9; font-weight: bold; } .sdk { color: #2ECC40; }
    #waifu { bottom: 0 !important; right: 0 !important; left: auto !important; }
    #snapshot { margin: 10px 0; }
    #snapshot img { border: 2px solid #333; max-width: 300px; background: #fff; }
  </style>
</head>
<body>
  <h2>Live2D Test v8 — Fixed Image Hook + Canvas Snapshot</h2>
  <div id="log">Loading...</div>
  <div id="snapshot"><strong>Canvas Snapshot: </strong></div>

  <script>
    const _origLog = console.log.bind(console);
    const _origError = console.error.bind(console);
    const _origWarn = console.warn.bind(console);

    const logEl = document.getElementById('log');
    let logLines = 0;
    function log(msg, cls) {
      if (++logLines > 800) {
        const lines = logEl.innerHTML.split('\n');
        logEl.innerHTML = lines.slice(-300).join('\n');
      }
      const safe = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      logEl.innerHTML += `<span class="${cls || 'ok'}">[${new Date().toISOString().slice(11,23)}] ${safe}</span>\n`;
      _origLog(msg);
      logEl.scrollTop = logEl.scrollHeight;
    }

    const myLogPrefixes = ['SYNC-PIXEL','GL Error','STATE:','FETCH','XHR','TEX_IMG','STATUS','FORCING','GL hooks','Hooking',
      'SDK loaded','Widget loaded','initWidget','WAIFU','===','+','State:','GL ops:','FB history:','Texture loads:',
      'Loaded textures:','waifu:','---','MODEL ','XHR_MODEL','Direct','TRYING','LIVE2D','WASM','OVERRIDE',
      'SNAPSHOT', 'SNAP_FBO', 'SNAP_DEF'];

    console.log = function() {
      const msg = Array.from(arguments).join(' ');
      if (msg && !myLogPrefixes.some(p => msg.startsWith(p))) {
        log('SDK.log: ' + msg, 'sdk');
      }
      return _origLog.apply(console, arguments);
    };
    console.error = function(){ log('SDK_ERR: ' + Array.from(arguments).join(' '), 'err'); _origError(...arguments); };
    console.warn  = function(){ log('SDK_WARN: ' + Array.from(arguments).join(' '), 'warn'); _origWarn(...arguments); };

    window.addEventListener('error', function(e) {
      log('WINDOW_ERROR: ' + e.message + ' @' + e.filename + ':' + e.lineno, 'err');
    });
    window.addEventListener('unhandledrejection', function(e) {
      log('UNHANDLED_REJECTION: ' + (e.reason?.message || e.reason), 'err');
    });

    // ===== Fetch interceptor =====
    const _origFetch = window.fetch;
    window.fetch = function(url, opts) {
      let urlStr = (url instanceof Request) ? url.url : String(url);
      if (urlStr.includes('live2d') || urlStr.includes('.moc3') || urlStr.includes('model3') || urlStr.includes('motion3') || urlStr.includes('exp3') || urlStr.includes('texture_') || urlStr.includes('physics3') || urlStr.includes('cdi3')) {
        let start = Date.now();
        return _origFetch.call(window, url, opts).then(resp => {
          const cl = resp.headers.get('content-length') || '?';
          const fname = urlStr.split('/').pop();
          log('FETCH [' + resp.status + ' ' + cl + 'B ' + (Date.now()-start) + 'ms] ' + fname, resp.ok ? 'ok' : 'err');
          return resp;
        }).catch(err => { log('FETCH_ERR: ' + fname + ' → ' + err.message, 'err'); throw err; });
      }
      return _origFetch.call(window, url, opts);
    };

    // ===== Image loading interceptor — FIXED: hook addEventListener at CONSTRUCTION time =====
    let textureLoadCount = 0;
    let textureErrorCount = 0;
    const textureFiles = [];
    const allImgSrcs = [];

    const _origImage = window.Image;
    window.Image = function() {
      const img = new _origImage();
      const _origSetSrc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
      let srcValue = '';

      // Hook addEventListener at construction time (BEFORE src is set)
      const _addEL = img.addEventListener.bind(img);
      img.addEventListener = function(evt, fn, opts) {
        if (evt === 'load') {
          const origFn = fn;
          fn = function(e) {
            const s = srcValue;
            const fname = s.split('/').pop();
            if (s && (s.includes('texture_') || s.includes('.png'))) {
              textureLoadCount++;
              const dims = img.naturalWidth + 'x' + img.naturalHeight;
              textureFiles.push(fname + ' ' + dims);
            }
            log('IMG_LOAD #' + textureLoadCount + ': ' + fname + (s.includes('texture_')||s.includes('.png')?' ★':''));
            return origFn.call(this, e);
          };
        }
        if (evt === 'error') {
          const origFn = fn;
          fn = function(e) {
            const s = srcValue;
            if (s && (s.includes('texture_') || s.includes('.png'))) {
              textureErrorCount++;
              log('!!! IMG_ERROR: ' + s.split('/').pop(), 'err');
            }
            return origFn.call(this, e);
          };
        }
        return _addEL.call(this, evt, fn, opts);
      };

      // Hook src setter
      Object.defineProperty(img, 'src', {
        get: function() { return srcValue; },
        set: function(val) {
          srcValue = val;
          if (val) allImgSrcs.push(val.split('/').pop());
          _origSetSrc.set.call(this, val);
        },
        configurable: true, enumerable: true
      });
      return img;
    };

    // ===== GL OP COUNTERS =====
    let glOps = { texImage2D: 0, drawElements: 0, drawArrays: 0, clear: 0, uniformMatrix4fv: 0, useProgram: 0, createTexture: 0, bindFramebuffer: 0, bindTexture: 0, bufferData: 0, enableVertexAttribArray: 0, viewport: 0 };
    let lastFB = '(none)';
    let fbHistory = [];
    let glHooked = false;
    let glRef = null;

    const origGetContext = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function(type, attrs) {
      if (this.id === 'live2d' && (type === 'webgl2' || type === 'webgl')) {
        attrs = attrs || {};
        attrs.preserveDrawingBuffer = true;
      }
      const ctx = origGetContext.call(this, type, attrs);
      if (this.id === 'live2d' && ctx && !glHooked) {
        glHooked = true;
        glRef = ctx;
        log('=== GL hooks installed ===', 'section');
        const gl = ctx;
        const origFns = {};
        for (const name of ['texImage2D','drawElements','drawArrays','clear','useProgram','uniformMatrix4fv','bufferData','enableVertexAttribArray']) {
          origFns[name] = gl[name].bind(gl);
          gl[name] = function() { glOps[name] = (glOps[name] || 0) + 1; return origFns[name].apply(gl, arguments); };
        }
        origFns.bindFramebuffer = gl.bindFramebuffer.bind(gl);
        gl.bindFramebuffer = function(target, fb) {
          glOps.bindFramebuffer++;
          lastFB = fb === null ? 'null(default)' : 'FBO';
          if (fbHistory.length < 40) fbHistory.push(lastFB);
          return origFns.bindFramebuffer.call(gl, target, fb);
        };
        origFns.createTexture = gl.createTexture.bind(gl);
        gl.createTexture = function() { glOps.createTexture++; return origFns.createTexture(); };
        origFns.bindTexture = gl.bindTexture.bind(gl);
        gl.bindTexture = function() { glOps.bindTexture++; return origFns.bindTexture.apply(gl, arguments); };
        origFns.viewport = gl.viewport.bind(gl);
        gl.viewport = function(x,y,w,h) { glOps.viewport++; return origFns.viewport.call(gl, x,y,w,h); };
      }
      return ctx;
    };

    // ===== Canvas Snapshot =====
    function snapshotCanvas(label) {
      const canvas = document.getElementById('live2d');
      if (!canvas) { log('SNAPSHOT: no canvas', 'err'); return; }
      try {
        // Also try reading from FBO
        if (glRef) {
          const px = new Uint8Array(4);
          let foundDefault = false, foundFBO = false;

          // Check default framebuffer
          glRef.bindFramebuffer(glRef.FRAMEBUFFER, null);
          for (let sy = 0; sy < canvas.height; sy += 10) {
            for (let sx = 0; sx < canvas.width; sx += 10) {
              glRef.readPixels(sx, sy, 1, 1, glRef.RGBA, glRef.UNSIGNED_BYTE, px);
              if (px[0] || px[1] || px[2] || px[3]) {
                log('SNAP_DEF: pixel(' + sx + ',' + sy + ') = RGBA(' + px.join(',') + ')', 'ok');
                foundDefault = true;
                break;
              }
            }
            if (foundDefault) break;
          }
          if (!foundDefault) log('SNAP_DEF: all zero on default FB ❌', 'err');
        }

        // toDataURL (works with preserveDrawingBuffer: true)
        const dataUrl = canvas.toDataURL('image/png');
        const size = Math.round(dataUrl.length / 1024);
        const snapshotEl = document.getElementById('snapshot');
        snapshotEl.innerHTML = '<strong>' + label + ' (' + size + 'KB): </strong><br><img src="' + dataUrl + '" style="max-width:300px">';
        log('SNAPSHOT: ' + label + ' (' + size + 'KB)', 'info');
      } catch(e) {
        log('SNAPSHOT err: ' + e.message, 'err');
      }
    }

    function periodicStatus() {
      log('STATUS @ +' + Math.round((Date.now() - startTime) / 1000) + 's: ' +
        'drawE=' + glOps.drawElements + ' createT=' + glOps.createTexture + ' texImg=' + glOps.texImage2D +
        ' clear=' + glOps.clear + ' texLoad=' + textureLoadCount + ' texErr=' + textureErrorCount, 'info');
    }

    let startTime;

    function checkGLQuick(label) {
      const canvas = document.getElementById('live2d');
      if (!canvas) { log(label + ': no canvas', 'err'); return; }
      try {
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl) { log(label + ': no GL', 'err'); return; }
        log(label + ': canvas=' + canvas.width + 'x' + canvas.height + ' lost=' + gl.isContextLost() +
          ' ops=' + JSON.stringify({createT:glOps.createTexture,texImg:glOps.texImage2D,drawE:glOps.drawElements,clear:glOps.clear}));
      } catch(e) { log(label + ': err=' + e.message, 'err'); }
    }

    // ===== MAIN =====
    window.__LIVE2D_CDN_PATH__ = '/live2d-api/';
    const BASE = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main/';

    function loadExternalResource(url, type) {
      return new Promise((resolve, reject) => {
        let tag;
        if (type === 'css') { tag = document.createElement('link'); tag.rel = 'stylesheet'; tag.href = url; }
        else { tag = document.createElement('script'); tag.src = url; }
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(new Error('Failed: ' + url));
        document.head.appendChild(tag);
      });
    }

    async function main() {
      startTime = Date.now();
      try {
        log('=== Loading CDN ===', 'section');
        await loadExternalResource(BASE + 'waifu.css', 'css');
        await loadExternalResource(BASE + 'Core/live2dcubismcore.js', 'js');
        await loadExternalResource(BASE + 'live2d-sdk.js', 'js');
        log('SDK loaded ✓');

        await loadExternalResource(BASE + 'waifu-tips.js', 'js');
        log('Widget loaded ✓');

        log('=== Calling initWidget ===', 'section');
        localStorage.setItem('modelId', '0');
        localStorage.setItem('modelTexturesId', '0');

        initWidget({
          waifuPath: BASE + 'waifu-tips.json',
          cdnPath: '/live2d-api/',
          homePath: 'https://kioshiroi.github.io/',
          tools: ['hitokoto', 'express', 'photo', 'info', 'quit'],
          dragEnable: true, dragDirection: ['x', 'y'], switchType: 'order'
        });
        log('initWidget() called ✓');

        // Take snapshots at intervals
        setTimeout(() => { checkGLQuick('+3s'); snapshotCanvas('+3s'); }, 3000);
        setTimeout(() => { checkGLQuick('+5s'); snapshotCanvas('+5s'); }, 5000);
        setTimeout(() => { checkGLQuick('+8s'); snapshotCanvas('+8s'); }, 8000);
        setTimeout(() => periodicStatus(), 10000);
        setTimeout(() => {
          checkGLQuick('+12s');
          snapshotCanvas('+12s');
          periodicStatus();
          log('=== Final ===', 'section');
          log('GL ops: ' + JSON.stringify(glOps), 'info');
          log('FB history last 20: ' + fbHistory.slice(-20).join(' → '), 'info');
          log('Texture loads: ' + textureLoadCount + ' errors: ' + textureErrorCount);
          log('Loaded textures: ' + JSON.stringify(textureFiles), 'info');
          log('All image srcs: ' + JSON.stringify(allImgSrcs), 'info');
        }, 12000);

        setTimeout(() => {
          periodicStatus();
          checkGLQuick('+20s');
          snapshotCanvas('+20s');
        }, 20000);

      } catch(e) {
        log('FATAL: ' + e.message + '\n' + e.stack, 'err');
      }
    }
    main();
  </script>
</body>
</html>
