<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live2D Test v9 — Moc3 Integrity Check + Force Reload</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f5f5f5; min-height: 120vh; }
    #log { padding: 10px; margin: 10px 0; border-radius: 4px; background: #fff; border: 1px solid #ddd; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #0074d9; } .warn { color: #ff851b; } .section { color: #b10dc9; font-weight: bold; } .sdk { color: #2ECC40; }
    #waifu { bottom: 0 !important; right: 0 !important; left: auto !important; }
    #snapshot { margin: 10px 0; }
    #snapshot img { border: 2px solid #333; max-width: 300px; background: #fff; }
  </style>
</head>
<body>
  <h2>Live2D Test v9 — Moc3 Integrity Check + Force Reload</h2>
  <div id="log">Loading...</div>
  <div id="snapshot"><strong>Canvas Snapshot: </strong></div>

  <script>
    const _origLog = console.log.bind(console);
    const _origError = console.error.bind(console);
    const _origWarn = console.warn.bind(console);

    const logEl = document.getElementById('log');
    let logLines = 0;
    function log(msg, cls) {
      if (++logLines > 1000) {
        const lines = logEl.innerHTML.split('\n');
        logEl.innerHTML = lines.slice(-400).join('\n');
      }
      const safe = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      logEl.innerHTML += `<span class="${cls || 'ok'}">[${((Date.now()-startTime)/1000).toFixed(3)}s] ${safe}</span>\n`;
      _origLog(msg);
      logEl.scrollTop = logEl.scrollHeight;
    }

    const myPrefixes = ['SNAP','IMG_LOAD','IMG_ERR','FETCH','STATUS','SDK loaded','Widget loaded','initWidget',
      '===','WAIFU','WINDOW','UNHANDLED','MOC3_','FORCE','Direct','snapshot'];

    console.log = function() {
      const msg = Array.from(arguments).join(' ');
      if (msg && !myPrefixes.some(p => msg.startsWith(p))) {
        log('🏷 SDK: ' + msg, 'sdk');
      }
      return _origLog.apply(console, arguments);
    };
    console.error = function(){ log('🔴 SDK_ERR: ' + Array.from(arguments).join(' '), 'err'); _origError(...arguments); };
    console.warn  = function(){ log('🟡 SDK_WARN: ' + Array.from(arguments).join(' '), 'warn'); _origWarn(...arguments); };

    window.addEventListener('error', e => log('⚠ WINDOW_ERROR: ' + e.message, 'err'));
    window.addEventListener('unhandledrejection', e => log('⚠ UNHANDLED_REJECTION: ' + (e.reason?.message||e.reason), 'err'));

    // ===== Fetch interceptor — checks moc3 integrity =====
    const _origFetch = window.fetch;
    const moc3Files = []; // track moc3 fetches for analysis

    window.fetch = function(url, opts) {
      let urlStr = (url instanceof Request) ? url.url : String(url);
      if (urlStr.includes('live2d') || urlStr.includes('.moc3') || urlStr.includes('model3') || urlStr.includes('motion3') || urlStr.includes('exp3') || urlStr.includes('texture_') || urlStr.includes('physics3') || urlStr.includes('cdi3')) {
        let start = Date.now();
        const fname = urlStr.split('/').pop();

        // For moc3: clone and check integrity
        const isMoc3 = fname.includes('.moc3');

        return _origFetch.call(window, url, opts).then(resp => {
          const cl = resp.headers.get('content-length') || '?';
          const ce = resp.headers.get('content-encoding') || 'none';
          const ct = resp.headers.get('content-type') || '?';
          log('FETCH [' + resp.status + ' ' + cl + 'B ce=' + ce + ' ' + (Date.now()-start) + 'ms] ' + fname, resp.ok ? 'ok' : 'err');

          if (isMoc3 && resp.ok) {
            return resp.clone().arrayBuffer().then(buf => {
              log('MOC3_INTEGRITY: ' + fname + ' buf=' + buf.byteLength + 'B headerCL=' + cl + 'B ce=' + ce, buf.byteLength > 0 ? 'ok' : 'err');
              if (buf.byteLength < 1000000) log('⚠ MOC3 TOO SMALL! Expected >16MB, got ' + buf.byteLength, 'err');
              return resp;
            });
          }
          return resp;
        }).catch(err => { log('FETCH_ERR: ' + fname + ' → ' + err.message, 'err'); throw err; });
      }
      return _origFetch.call(window, url, opts);
    };

    // ===== Image hook =====
    let textureLoadCount = 0;
    let textureErrorCount = 0;
    const allImgSrcs = [];

    const _origImage = window.Image;
    window.Image = function() {
      const img = new _origImage();
      const _origSetSrc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
      let srcValue = '';

      const _addEL = img.addEventListener.bind(img);
      img.addEventListener = function(evt, fn, opts) {
        if (evt === 'load') {
          const origFn = fn;
          fn = function(e) {
            if (srcValue && (srcValue.includes('texture_') || srcValue.includes('.png'))) textureLoadCount++;
            log('IMG_LOAD: ' + srcValue.split('/').pop() + (srcValue.includes('texture_')?' ★':''));
            return origFn.call(this, e);
          };
        }
        if (evt === 'error') {
          const origFn = fn;
          fn = function(e) {
            if (srcValue && (srcValue.includes('texture_') || srcValue.includes('.png'))) textureErrorCount++;
            log('IMG_ERR: ' + srcValue.split('/').pop(), 'err');
            return origFn.call(this, e);
          };
        }
        return _addEL.call(this, evt, fn, opts);
      };

      Object.defineProperty(img, 'src', {
        get: function() { return srcValue; },
        set: function(val) { srcValue = val; if (val) allImgSrcs.push(val.split('/').pop()); _origSetSrc.set.call(this, val); },
        configurable: true, enumerable: true
      });
      return img;
    };

    // ===== GL counters =====
    let glOps = { texImage2D: 0, drawElements: 0, clear: 0, createTexture: 0, bindFramebuffer: 0, bindTexture: 0 };
    let lastFB = '(none)';
    let glRef = null;
    let glHooked = false;

    const origGetContext = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function(type, attrs) {
      if (this.id === 'live2d' && (type === 'webgl2' || type === 'webgl')) {
        attrs = attrs || {};
        attrs.preserveDrawingBuffer = true;
        log('preserveDrawingBuffer=true forced');
      }
      const ctx = origGetContext.call(this, type, attrs);
      if (this.id === 'live2d' && ctx && !glHooked) {
        glHooked = true; glRef = ctx;
        const gl = ctx;
        ['texImage2D','drawElements','clear','useProgram','createTexture','bindTexture','bindFramebuffer'].forEach(name => {
          const orig = gl[name].bind(gl);
          gl[name] = function() { glOps[name] = (glOps[name]||0)+1; return orig.apply(gl, arguments); };
        });
      }
      return ctx;
    };

    function snapshotCanvas(label) {
      const canvas = document.getElementById('live2d');
      if (!canvas) return;
      try {
        // Dense pixel scan
        if (glRef && !glRef.isContextLost()) {
          glRef.bindFramebuffer(glRef.FRAMEBUFFER, null);
          const px = new Uint8Array(4);
          for (let y = 0; y < canvas.height; y += 5) {
            for (let x = 0; x < canvas.width; x += 5) {
              glRef.readPixels(x, y, 1, 1, glRef.RGBA, glRef.UNSIGNED_BYTE, px);
              if (px[0] || px[1] || px[2] || px[3]) {
                log('SNAP_PIXEL at (' + x + ',' + y + ') RGBA(' + px.join(',') + ') ✓', 'ok');
                break;
              }
            }
          }
        }
        const dataUrl = canvas.toDataURL('image/png');
        const snapshotEl = document.getElementById('snapshot');
        snapshotEl.innerHTML = '<strong>' + label + ' (' + Math.round(dataUrl.length/1024) + 'KB): </strong><br><img src="' + dataUrl + '" style="max-width:300px">';
        log('snapshot taken: ' + label, 'info');
      } catch(e) { log('snapshot err: ' + e.message, 'err'); }
    }

    function periodicStatus() {
      log('STATUS: drawE=' + glOps.drawElements + ' createT=' + glOps.createTexture + ' texImg=' + glOps.texImage2D +
        ' clear=' + glOps.clear + ' texLoad=' + textureLoadCount + ' allImgs=' + allImgSrcs.length, 'info');
    }

    let startTime;

    // ===== MAIN =====
    window.__LIVE2D_CDN_PATH__ = '/live2d-api/';
    const BASE = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main/';

    function loadExternalResource(url, type) {
      return new Promise((resolve, reject) => {
        let tag;
        if (type === 'css') { tag = document.createElement('link'); tag.rel = 'stylesheet'; tag.href = url; }
        else { tag = document.createElement('script'); tag.src = url; }
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(new Error('Failed: ' + url));
        document.head.appendChild(tag);
      });
    }

    loadExternalResource(BASE + 'waifu.css', 'css');
    loadExternalResource(BASE + 'Core/live2dcubismcore.js', 'js');
    loadExternalResource(BASE + 'live2d-sdk.js', 'js');

    async function main() {
      startTime = Date.now();
      try {
        // Wait for SDK to be ready
        let waited = 0;
        while (!window.live2d && waited < 10000) {
          await new Promise(r => setTimeout(r, 100));
          waited += 100;
        }
        if (!window.live2d) { log('SDK failed to load', 'err'); return; }
        log('=== SDK ready ===', 'section');

        await loadExternalResource(BASE + 'waifu-tips.js', 'js');
        log('Widget ready');

        // ** FIRST: directly fetch the moc3 to check integrity **
        log('=== Checking moc3 integrity ===', 'section');
        try {
          const resp = await fetch('/live2d-api/model/teto/重音テト.moc3');
          log('DIRECT_FETCH: status=' + resp.status + ' cl=' + resp.headers.get('content-length') + ' ce=' + (resp.headers.get('content-encoding')||'none'));
          const buf = await resp.arrayBuffer();
          log('DIRECT_MOC3: arrayBuffer = ' + buf.byteLength + ' bytes', buf.byteLength > 15000000 ? 'ok' : 'err');
          // Look for 3rd moc3 header: it should have "MOC3" at the beginning
          if (buf.byteLength >= 4) {
            const dv = new DataView(buf);
            log('DIRECT_MOC3: magic bytes = 0x' + dv.getUint32(0, false).toString(16) + ' (expected MOC3=0x4D4F4333)', 'info');
          }
        } catch(e) {
          log('DIRECT_MOC3 fetch failed: ' + e.message, 'err');
        }

        log('=== Calling initWidget ===', 'section');
        localStorage.setItem('modelId', '0');
        localStorage.setItem('modelTexturesId', '0');

        initWidget({
          waifuPath: BASE + 'waifu-tips.json',
          cdnPath: '/live2d-api/',
          homePath: 'https://kioshiroi.github.io/',
          tools: ['hitokoto', 'express', 'photo', 'info', 'quit'],
          dragEnable: true, dragDirection: ['x', 'y'], switchType: 'order'
        });
        log('initWidget() called ✓');

        // ===== FORCE RELOAD at +3s (widget's first attempt might fail) =====
        setTimeout(() => {
          log('=== FORCE reload at +3s ===', 'section');
          if (window.live2d && window.live2d.loadModel) {
            window.live2d.loadModel('/live2d-api/model/teto/');
            log('FORCE loadModel called');
          } else {
            log('FORCE: live2d.loadModel not available', 'err');
          }
        }, 3000);

        // Snapshots
        setTimeout(() => { periodicStatus(); snapshotCanvas('+4s'); }, 4000);
        setTimeout(() => { periodicStatus(); snapshotCanvas('+8s'); }, 8000);
        setTimeout(() => { periodicStatus(); snapshotCanvas('+12s'); }, 12000);
        setTimeout(() => {
          periodicStatus();
          snapshotCanvas('+20s');
          log('=== Final ===', 'section');
          log('GL ops: ' + JSON.stringify(glOps), 'info');
          log('Texture loads: ' + textureLoadCount);
          log('All image srcs (' + allImgSrcs.length + '): ' + JSON.stringify(allImgSrcs), 'info');
        }, 20000);

      } catch(e) {
        log('FATAL: ' + e.message + '\n' + e.stack, 'err');
      }
    }
    main();
  </script>
</body>
</html>
