<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live2D Test v20 — rAF snap + clear/bindFb tracking</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f5f5f5; min-height: 120vh; }
    #log { padding: 10px; margin: 10px 0; border-radius: 4px; background: #fff; border: 1px solid #ddd; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #0074d9; } .section { color: #b10dc9; font-weight: bold; }
    #waifu { bottom: 0 !important; right: 0 !important; left: auto !important; }
    #snapshot { margin: 10px 0; }
    #snapshot img { border: 2px solid #333; max-width: 300px; background: #fff; }
  </style>
</head>
<body>
  <h2>Live2D Test v20 — rAF snap timing + clear/bindFb logging</h2>
  <div id="log">Loading...</div>
  <div id="snapshot"><strong>Canvas Snapshot: </strong></div>

  <script>
    const logEl = document.getElementById('log');
    let startTime;
    function log(msg, cls) {
      const safe = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      logEl.innerHTML += `<span class="${cls || 'ok'}">[${((Date.now()-startTime)/1000).toFixed(1)}s] ${safe}</span>\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ===== Trackers =====
    let drawElements = 0, drawArrays = 0, texturesCreated = 0;
    let clearCalls = 0, bindFbCalls = 0;
    let lastBindTarget = '?';  // 'FBO' or 'def'
    let glType = '?';

    const _origGetCtx = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function(type, attrs) {
      if (this.id === 'live2d' && type && type.includes('webgl')) {
        if (attrs) attrs.preserveDrawingBuffer = true;
        else { attrs = { preserveDrawingBuffer: true }; }
      }
      const ctx = _origGetCtx.call(this, type, attrs);
      if (this.id === 'live2d' && ctx) {
        const gl = ctx;
        glType = type;

        const _de = gl.drawElements.bind(gl);
        gl.drawElements = function() { drawElements++; return _de.apply(gl, arguments); };
        const _da = gl.drawArrays.bind(gl);
        gl.drawArrays = function() { drawArrays++; return _da.apply(gl, arguments); };
        const _ct = gl.createTexture.bind(gl);
        gl.createTexture = function() { texturesCreated++; return _ct(); };

        // === bindFramebuffer (no getParameter — just count + track target) ===
        const _bf = gl.bindFramebuffer.bind(gl);
        gl.bindFramebuffer = function(target, fb) {
          bindFbCalls++;
          // Track whether we're binding an FBO or default
          // target can be FRAMEBUFFER, DRAW_FRAMEBUFFER, READ_FRAMEBUFFER
          // fb === null means default framebuffer
          // We only care about DRAW bindings (FRAMEBUFFER or DRAW_FRAMEBUFFER)
          if (target === gl.FRAMEBUFFER || target === gl.DRAW_FRAMEBUFFER) {
            lastBindTarget = fb === null ? 'def' : 'FBO';
          }
          _bf(target, fb);
        };

        // === clear (count only, no getParameter) ===
        const _cl = gl.clear.bind(gl);
        gl.clear = function(mask) {
          clearCalls++;
          _cl(mask);
        };
      }
      return ctx;
    };

    function snap(label) {
      const c = document.getElementById('live2d');
      if (!c) return;
      const gl = c.getContext('webgl2') || c.getContext('webgl');
      if (!gl || gl.isContextLost()) return;

      // Read current state
      const curDrawFb = gl.getParameter(gl.DRAW_FRAMEBUFFER_BINDING);
      const curReadFb = gl.getParameter(gl.READ_FRAMEBUFFER_BINDING);
      const vp = gl.getParameter(gl.VIEWPORT);
      const colorMask = gl.getParameter(gl.COLOR_WRITEMASK);  // [r,g,b,a]
      const clearColor = gl.getParameter(gl.COLOR_CLEAR_VALUE);  // [r,g,b,a]

      // Bind default FB for reading
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      const px = new Uint8Array(4);
      let defPixel = null;
      for (let y = 0; y < c.height && !defPixel; y += 5) {
        for (let x = 0; x < c.width && !defPixel; x += 5) {
          gl.readPixels(x, y, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
          if (px[0] || px[1] || px[2] || px[3]) defPixel = { x, y, px: Array.from(px) };
        }
      }

      // Check if any FBO is currently bound (use DRAW binding)
      if (curDrawFb) {
        gl.bindFramebuffer(gl.FRAMEBUFFER, curDrawFb);
        if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE) {
          let fboPx = null;
          for (let y = 0; y < c.height && !fboPx; y += 10) {
            for (let x = 0; x < c.width && !fboPx; x += 10) {
              gl.readPixels(x, y, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
              if (px[0] || px[1] || px[2] || px[3]) fboPx = { x, y, px: Array.from(px) };
            }
          }
          if (fboPx) {
            log('FBO-PXL: (' + fboPx.x + ',' + fboPx.y + ') r' + fboPx.px, 'ok');
          }
        }
      }

      // Restore
      gl.bindFramebuffer(gl.READ_FRAMEBUFFER, curReadFb);
      gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, curDrawFb);

      let msg = 'DFB=' + (defPixel ? `FOUND(${defPixel.x},${defPixel.y})` : 'ZERO');
      msg += ` draw=${(curDrawFb?'FBO':'def')} lastBind=${lastBindTarget}`;
      msg += ` vp=${vp[2]}x${vp[3]} clr=${clearCalls} fbBind=${bindFbCalls}`;
      msg += ` colorW=${colorMask} clearC=(${clearColor.join(',')})`;
      log('SNAP[' + label + '] de=' + drawElements + ' ' + msg, defPixel ? 'ok' : 'warn');

      const du = c.toDataURL('image/png');
      document.getElementById('snapshot').innerHTML = '<strong>'+label+' ('+Math.round(du.length/1024)+'KB de='+drawElements+'):</strong><br><img src="'+du+'" style="max-width:300px">';
    }

    // rAF-based snapshot — fires right after a render frame
    function rAFSnap(label) {
      // Double rAF to ensure we're between frames (after rendering, before next clear)
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          snap(label + ' (rAF)');
        });
      });
    }

    // ===== MAIN =====
    window.__LIVE2D_CDN_PATH__ = '/live2d-api/';
    const BASE = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main/';
    const MOC3_PATH = '/live2d-api/model/teto/重音テト.moc3';

    const _origFetch = window.fetch;
    let moc3BlobUrl = null;

    function loadScript(url) { return new Promise((r, rej) => { const t = document.createElement('script'); t.src = url; t.onload = r; t.onerror = () => rej(new Error(url)); document.head.appendChild(t); }); }
    function loadCss(url) { return new Promise((r, rej) => { const t = document.createElement('link'); t.rel = 'stylesheet'; t.href = url; t.onload = r; t.onerror = () => rej(new Error(url)); document.head.appendChild(t); }); }

    async function main() {
      startTime = Date.now();
      try {
        log('=== Step 0: precache moc3 ===', 'section');
        const resp = await _origFetch(MOC3_PATH);
        const buf = await resp.arrayBuffer();
        moc3BlobUrl = URL.createObjectURL(new Blob([buf]));
        log('MOC3 precached: ' + buf.byteLength + 'B');

        window.fetch = function(url, opts) {
          const urlStr = (url instanceof Request) ? url.url : String(url);
          if (moc3BlobUrl && urlStr.includes('重音テト.moc3')) return _origFetch(moc3BlobUrl, opts);
          return _origFetch.call(window, url, opts);
        };

        log('=== Step 1: waifu.css ===', 'section');
        await loadCss(BASE + 'waifu.css');
        log('=== Step 2: Core ===', 'section');
        await loadScript(BASE + 'Core/live2dcubismcore.js');
        await new Promise(r => setTimeout(r, 200));
        log('=== Step 3: SDK ===', 'section');
        await loadScript(BASE + 'live2d-sdk.js');
        let w = 0;
        while (!window.live2d && w < 15000) { await new Promise(r => setTimeout(r, 100)); w += 100; }
        log('=== Step 4: waifu-tips.js ===', 'section');
        await loadScript(BASE + 'waifu-tips.js');

        setTimeout(() => {
          const waifu = document.getElementById('waifu');
          if (waifu) { waifu.style.display = 'block'; waifu.style.visibility = 'visible'; waifu.style.opacity = '1'; waifu.style.zIndex = '99999'; }
          const toggle = document.getElementById('waifu-toggle');
          if (toggle) { toggle.click(); log('TOGGLE clicked'); }
        }, 200);

        log('=== initWidget ===', 'section');
        localStorage.setItem('modelId', '0');
        localStorage.setItem('modelTexturesId', '0');
        initWidget({
          waifuPath: BASE + 'waifu-tips.json',
          cdnPath: '/live2d-api/',
          homePath: 'https://kioshiroi.github.io/',
          tools: ['hitokoto', 'express', 'photo', 'info', 'quit'],
          dragEnable: true, dragDirection: ['x', 'y'], switchType: 'order'
        });
        log('initWidget done (gl=' + glType + ')');

        // Regular setTimeout snaps
        for (const t of [8, 10, 18, 20, 30, 45, 60]) {
          setTimeout(() => snap('+' + t + 's'), t * 1000);
        }

        // rAF-based snaps at key times
        setTimeout(() => rAFSnap('+5s'), 5000);
        setTimeout(() => rAFSnap('+12s'), 12000);
        setTimeout(() => rAFSnap('+25s'), 25000);

        // Tap
        setTimeout(() => {
          const c = document.getElementById('live2d');
          if (c) { ['mousedown','touchstart'].forEach(evt => c.dispatchEvent(new Event(evt, { bubbles: true }))); }
        }, 3000);

      } catch(e) { log('FATAL: ' + e.message, 'err'); }
    }
    main();
  </script>
</body>
</html>
