<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live2D Test v15 — Clean Blob Precache, No Hooks</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f5f5f5; min-height: 120vh; }
    #log { padding: 10px; margin: 10px 0; border-radius: 4px; background: #fff; border: 1px solid #ddd; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #0074d9; } .section { color: #b10dc9; font-weight: bold; }
    #waifu { bottom: 0 !important; right: 0 !important; left: auto !important; }
    #snapshot { margin: 10px 0; }
    #snapshot img { border: 2px solid #333; max-width: 300px; background: #fff; }
  </style>
</head>
<body>
  <h2>Live2D Test v15 — Clean Blob Precache (no hooks)</h2>
  <div id="log">Loading...</div>
  <div id="snapshot"><strong>Canvas Snapshot: </strong></div>

  <script>
    const _origLog = console.log.bind(console);
    const logEl = document.getElementById('log');
    let startTime;
    function log(msg, cls) {
      const safe = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      logEl.innerHTML += `<span class="${cls || 'ok'}">[${((Date.now()-startTime)/1000).toFixed(1)}s] ${safe}</span>\n`;
      _origLog(msg);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // NO fetch interception — use a blob URL to replace the actual moc3 URL.
    // The SDK's loadModel constructs URLs from the cdnPath. We override
    // the fetch to redirect only the moc3 request to our blob URL.
    let moc3BlobUrl = null;

    const _origFetch = window.fetch;
    window.fetch = function(url, opts) {
      const urlStr = (url instanceof Request) ? url.url : String(url);
      // Only intercept the moc3 — everything else passes through unmodified
      if (moc3BlobUrl && urlStr.includes('重音テト.moc3')) {
        log('MOC3: redirecting to blob URL (instant)');
        return _origFetch(moc3BlobUrl, opts);
      }
      // Pass through entirely — no logging, no wrapping
      return _origFetch.call(window, url, opts);
    };

    // Snapshot: read WebGL pixels directly from canvas
    function snap(label) {
      const canvas = document.getElementById('live2d');
      if (!canvas) { log('SNAP: no canvas', 'err'); return; }
      try {
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl || gl.isContextLost()) { log('SNAP: no GL context', 'err'); return; }

        gl.bindFramebuffer(gl.FRAMEBUFFER, null);
        const px = new Uint8Array(4);
        let found = false;
        for (let y = 0; y < canvas.height && !found; y += 5) {
          for (let x = 0; x < canvas.width && !found; x += 5) {
            gl.readPixels(x, y, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
            if (px[0] || px[1] || px[2] || px[3]) {
              log('SNAP: pixel at (' + x + ',' + y + ') RGBA(' + px.join(',') + ') ✓', 'ok');
              found = true;
            }
          }
        }
        if (!found) log('SNAP: all pixels zero', 'warn');

        const dataUrl = canvas.toDataURL('image/png');
        const snapEl = document.getElementById('snapshot');
        snapEl.innerHTML = '<strong>' + label + ' (' + Math.round(dataUrl.length/1024) + 'KB): </strong><br><img src="' + dataUrl + '" style="max-width:300px">';
        log('SNAP: ' + label + ' done', 'info');
      } catch(e) { log('SNAP error: ' + e.message, 'err'); }
    }

    // GC status check
    function status() {
      const canvas = document.getElementById('live2d');
      const gl = canvas ? (canvas.getContext('webgl2') || canvas.getContext('webgl')) : null;
      if (gl && !gl.isContextLost()) {
        const bufCount = gl.getParameter(gl.RENDERBUFFER_BINDING) ? 'has_rb' : 'no_rb';
        const prog = gl.getParameter(gl.CURRENT_PROGRAM) ? 'has_prog' : 'no_prog';
        const fb = gl.getParameter(gl.FRAMEBUFFER_BINDING) ? 'fbo_bound' : 'default_fb';
        log('STATUS: canvas=' + canvas.width + 'x' + canvas.height + ' ' + bufCount + ' ' + prog + ' ' + fb);
      }
      const waifu = document.getElementById('waifu');
      log('STATUS: waifu el=' + (waifu ? 'present' : 'MISSING') + ' visible=' + (waifu && waifu.offsetParent !== null ? 'yes' : 'no'));
    }

    // ===== MAIN =====
    window.__LIVE2D_CDN_PATH__ = '/live2d-api/';
    const BASE = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main/';
    const MOC3_PATH = '/live2d-api/model/teto/重音テト.moc3';

    function loadScript(url) {
      return new Promise((resolve, reject) => {
        const tag = document.createElement('script'); tag.src = url;
        tag.onload = () => resolve();
        tag.onerror = () => reject(new Error('Failed: ' + url));
        document.head.appendChild(tag);
      });
    }
    function loadCss(url) {
      return new Promise((resolve, reject) => {
        const tag = document.createElement('link'); tag.rel = 'stylesheet'; tag.href = url;
        tag.onload = () => resolve();
        tag.onerror = () => reject(new Error('Failed: ' + url));
        document.head.appendChild(tag);
      });
    }

    async function main() {
      startTime = Date.now();
      try {
        // ===== STEP 0: Precache moc3 to Blob URL =====
        log('=== Precache: downloading moc3 (16MB)... ===', 'section');
        const resp = await _origFetch(MOC3_PATH);
        const buf = await resp.arrayBuffer();
        const blob = new Blob([buf], { type: 'application/octet-stream' });
        moc3BlobUrl = URL.createObjectURL(blob);
        log('MOC3: cached ' + buf.byteLength + 'B to blob:' + moc3BlobUrl.slice(0, 50) + '...');

        // ===== STEP 1: Sequential load =====
        log('=== Loading waifu.css ===', 'section');
        await loadCss(BASE + 'waifu.css');

        log('=== Loading Cubism Core ===', 'section');
        await loadScript(BASE + 'Core/live2dcubismcore.js');
        await new Promise(r => setTimeout(r, 200));

        log('=== Loading Live2D SDK ===', 'section');
        await loadScript(BASE + 'live2d-sdk.js');

        let w = 0;
        while (!window.live2d && w < 15000) {
          await new Promise(r => setTimeout(r, 100)); w += 100;
        }
        if (!window.live2d) { log('SDK TIMEOUT', 'err'); return; }

        log('=== Loading waifu-tips.js ===', 'section');
        await loadScript(BASE + 'waifu-tips.js');

        // ===== STEP 2: Init widget =====
        log('=== initWidget ===', 'section');
        localStorage.setItem('modelId', '0');
        localStorage.setItem('modelTexturesId', '0');

        initWidget({
          waifuPath: BASE + 'waifu-tips.json',
          cdnPath: '/live2d-api/',
          homePath: 'https://kioshiroi.github.io/',
          tools: ['hitokoto', 'express', 'photo', 'info', 'quit'],
          dragEnable: true, dragDirection: ['x', 'y'], switchType: 'order'
        });
        log('initWidget done');

        // ===== STEP 3: Monitor =====
        setTimeout(() => { status(); snap('+5s'); }, 5000);
        setTimeout(() => { status(); snap('+10s'); }, 10000);
        setTimeout(() => { status(); snap('+20s'); }, 20000);
        setTimeout(() => { status(); snap('+35s'); }, 35000);

        setTimeout(() => {
          log('=== Final ===', 'section');
          status();
          snap('+60s');
          // Check if canvas has any content by examining css
          const waifu = document.getElementById('waifu');
          if (waifu) {
            const style = window.getComputedStyle(waifu);
            log('Waifu CSS: display=' + style.display + ' visibility=' + style.visibility + ' opacity=' + style.opacity + ' zIndex=' + style.zIndex);
            const c = document.getElementById('live2d');
            if (c) {
              const cs = window.getComputedStyle(c);
              log('Canvas CSS: display=' + cs.display + ' w=' + cs.width + ' h=' + cs.height + ' opacity=' + cs.opacity);
            }
          }
        }, 60000);

      } catch(e) {
        log('FATAL: ' + e.message, 'err');
      }
    }
    main();
  </script>
</body>
</html>
