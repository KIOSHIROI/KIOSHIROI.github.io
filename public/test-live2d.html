<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live2D Test v11 — Sequential Load, No Preload, SDK Trace</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f5f5f5; min-height: 120vh; }
    #log { padding: 10px; margin: 10px 0; border-radius: 4px; background: #fff; border: 1px solid #ddd; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #0074d9; } .warn { color: #ff851b; } .section { color: #b10dc9; font-weight: bold; } .sdk { color: #2ECC40; }
    #waifu { bottom: 0 !important; right: 0 !important; left: auto !important; }
    #snapshot { margin: 10px 0; }
    #snapshot img { border: 2px solid #333; max-width: 300px; background: #fff; }
  </style>
</head>
<body>
  <h2>Live2D Test v11 — Sequential Load, No Preload, SDK Trace</h2>
  <div id="log">Loading...</div>
  <div id="snapshot"><strong>Canvas Snapshot: </strong></div>

  <script>
    const _origLog = console.log.bind(console);
    const _origError = console.error.bind(console);
    const _origWarn = console.warn.bind(console);

    const logEl = document.getElementById('log');
    let logLines = 0;
    function log(msg, cls) {
      if (++logLines > 800) {
        const lines = logEl.innerHTML.split('\n');
        logEl.innerHTML = lines.slice(-300).join('\n');
      }
      const safe = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      logEl.innerHTML += `<span class="${cls || 'ok'}">[${((Date.now()-startTime)/1000).toFixed(3)}s] ${safe}</span>\n`;
      _origLog(msg);
      logEl.scrollTop = logEl.scrollHeight;
    }

    const myPrefixes = ['SNAP','IMG_LOAD','IMG_ERR','FETCH','FETCH_ERR','XHR','STATUS','initWidget',
      '===','WINDOW','UNHANDLED','TEX_','GLTEX','GLHOOK','HEAD','POOL'];

    console.log = function() {
      const msg = Array.from(arguments).join(' ');
      if (msg && !myPrefixes.some(p => msg.startsWith(p))) {
        log('SDK: ' + msg, 'sdk');
      }
      return _origLog.apply(console, arguments);
    };
    console.error = function(){ log('SDK_ERR: ' + Array.from(arguments).join(' '), 'err'); _origError(...arguments); };
    console.warn  = function(){ log('SDK_WARN: ' + Array.from(arguments).join(' '), 'warn'); _origWarn(...arguments); };

    window.addEventListener('error', e => log('WINDOW_ERROR: ' + e.message + ' @ ' + (e.filename||'?').split('/').pop() + ':' + e.lineno, 'err'));
    window.addEventListener('unhandledrejection', e => log('UNHANDLED_REJECTION: ' + (e.reason?.message||e.reason) + (e.reason?.stack ? '\n' + e.reason.stack.split('\n').slice(0,3).join('\n') : ''), 'err'));

    // ===== Connection pool tracking =====
    let pendingFetches = 0;
    const MAX_CONCURRENT = 6;
    function poolStatus() {
      log('POOL: pending=' + pendingFetches + '/' + MAX_CONCURRENT);
    }

    // ===== Fetch interceptor with connection tracking =====
    const _origFetch = window.fetch;
    const fetchLog = []; // full log of all fetches
    window.fetch = function(url, opts) {
      let urlStr = (url instanceof Request) ? url.url : String(url);
      if (urlStr.includes('live2d') || urlStr.includes('.moc3') || urlStr.includes('model3') || urlStr.includes('motion3') || urlStr.includes('exp3') || urlStr.includes('texture_') || urlStr.includes('physics3') || urlStr.includes('cdi3') || urlStr.includes('waifu-tips')) {
        let start = Date.now();
        const fname = decodeURIComponent(urlStr.split('?')[0].split('/').pop());
        pendingFetches++;
        poolStatus();

        // Special: if this is teto.model3.json, do a parallel direct check too
        const isTetoModel3 = fname.includes('teto.model3.json');

        return _origFetch.call(window, url, opts).then(resp => {
          pendingFetches--;
          const cl = resp.headers.get('content-length') || '?';
          const ce = resp.headers.get('content-encoding') || 'none';
          const dur = Date.now()-start;
          fetchLog.push({ file: fname, status: resp.status, size: cl, dur });

          if (resp.ok && isTetoModel3) {
            // Clone and peek at model3.json content to verify texture count
            return resp.clone().text().then(text => {
              try {
                const j = JSON.parse(text);
                const texCount = j.FileReferences?.Textures?.length || 0;
                log('FETCH [' + resp.status + ' ' + cl + 'B ce=' + ce + ' ' + dur + 'ms] ' + fname + ' textures=' + texCount, 'ok');
              } catch(e) {
                log('FETCH [' + resp.status + ' ' + cl + 'B ce=' + ce + ' ' + dur + 'ms] ' + fname, 'ok');
              }
              return resp;
            }).catch(() => { log('FETCH [' + resp.status + ' ' + cl + 'B ' + dur + 'ms] ' + fname, 'ok'); return resp; });
          }

          log('FETCH [' + resp.status + ' ' + cl + 'B ce=' + ce + ' ' + dur + 'ms] ' + fname, resp.ok ? 'ok' : 'err');
          return resp;
        }).catch(err => {
          pendingFetches--;
          log('FETCH_ERR: ' + fname + ' ' + err.message, 'err');
          throw err;
        });
      }
      return _origFetch.call(window, url, opts);
    };

    // ===== Image hook (simplified — just track counts) =====
    let textureLoadCount = 0;
    let textureErrorCount = 0;
    const loadedTextures = [];
    const failedTextures = [];

    const _origImage = window.Image;
    window.Image = function() {
      const img = new _origImage();
      const _origSetSrc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
      let srcValue = '';
      let fname = '';

      const _addEL = img.addEventListener.bind(img);
      img.addEventListener = function(evt, fn, opts) {
        if (evt === 'load') {
          const origFn = fn;
          fn = function(e) {
            if (fname && fname.includes('texture_')) {
              textureLoadCount++;
              loadedTextures.push(fname);
              log('IMG_LOAD: ' + fname + ' ' + this.naturalWidth + 'x' + this.naturalHeight + ' (' + (loadedTextures.length) + '/' + (loadedTextures.length+failedTextures.length+pendingTextures()) + ')');
            }
            return origFn.call(this, e);
          };
        }
        if (evt === 'error') {
          const origFn = fn;
          fn = function(e) {
            if (fname && fname.includes('texture_')) {
              textureErrorCount++;
              failedTextures.push(fname);
              log('IMG_ERR: ' + fname + ' complete=' + this.complete, 'err');
            }
            return origFn.call(this, e);
          };
        }
        return _addEL.call(this, evt, fn, opts);
      };

      Object.defineProperty(img, 'src', {
        get: function() { return srcValue; },
        set: function(val) {
          srcValue = val;
          if (val) { fname = decodeURIComponent(val.split('?')[0].split('/').pop()); }
          _origSetSrc.set.call(this, val);
        },
        configurable: true, enumerable: true
      });
      return img;
    };

    // Helper: how many Image objects exist with src set but not yet loaded/errored
    function pendingTextures() {
      return document.querySelectorAll ? 0 : 0; // can't easily track this
    }

    // ===== GL hooks =====
    let glOps = { texImage2D: 0, drawElements: 0, clear: 0, createTexture: 0, bindTexture: 0, useProgram: 0 };
    let glRef = null;
    let glHooked = false;

    const origGetContext = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function(type, attrs) {
      if (this.id === 'live2d' && (type === 'webgl2' || type === 'webgl')) {
        attrs = attrs || {};
        attrs.preserveDrawingBuffer = true;
        log('GLHOOK: preserveDrawingBuffer=true set');
      }
      const ctx = origGetContext.call(this, type, attrs);
      if (this.id === 'live2d' && ctx && !glHooked) {
        glHooked = true; glRef = ctx;
        const gl = ctx;
        ['texImage2D','drawElements','clear','useProgram','createTexture','bindTexture','bindFramebuffer'].forEach(name => {
          const orig = gl[name].bind(gl);
          gl[name] = function() { glOps[name] = (glOps[name]||0)+1; return orig.apply(gl, arguments); };
        });

        // Log texImage2D source info
        const _origTexImage2D = gl.texImage2D.bind(gl);
        gl.texImage2D = function() {
          let srcDesc = '?';
          if (arguments.length >= 2) {
            const arg1 = arguments[1];
            if (arg1 instanceof HTMLImageElement) {
              srcDesc = 'IMG ' + arg1.naturalWidth + 'x' + arg1.naturalHeight + ' ' + (arg1.src||'').split('/').pop();
            } else if (arg1 instanceof ImageBitmap) {
              srcDesc = 'Bitmap ' + arg1.width + 'x' + arg1.height;
            } else if (arguments.length >= 6) {
              srcDesc = 'buf ' + arguments[3] + 'x' + arguments[4];
            }
          }
          log('TEX_UPLOAD #' + (glOps.texImage2D+1) + ': ' + srcDesc, 'info');
          return _origTexImage2D.apply(gl, arguments);
        };
      }
      return ctx;
    };

    function snapshotCanvas(label) {
      const canvas = document.getElementById('live2d');
      if (!canvas) return;
      try {
        if (glRef && !glRef.isContextLost()) {
          glRef.bindFramebuffer(glRef.FRAMEBUFFER, null);
          const px = new Uint8Array(4);
          let found = false;
          for (let y = 0; y < canvas.height && !found; y += 7) {
            for (let x = 0; x < canvas.width && !found; x += 7) {
              glRef.readPixels(x, y, 1, 1, glRef.RGBA, glRef.UNSIGNED_BYTE, px);
              if (px[0] || px[1] || px[2] || px[3]) {
                log('SNAP_PIXEL at (' + x + ',' + y + ') RGBA(' + px.join(',') + ') ✓', 'ok');
                found = true;
              }
            }
          }
          if (!found) log('SNAP: all pixels zero', 'warn');
        }
        const dataUrl = canvas.toDataURL('image/png');
        const snapshotEl = document.getElementById('snapshot');
        snapshotEl.innerHTML = '<strong>' + label + ' (' + Math.round(dataUrl.length/1024) + 'KB): </strong><br><img src="' + dataUrl + '" style="max-width:300px">';
        log('snapshot taken: ' + label, 'info');
      } catch(e) { log('snapshot err: ' + e.message, 'err'); }
    }

    function periodicStatus() {
      log('STATUS: drawE=' + glOps.drawElements + ' createT=' + glOps.createTexture + ' texImg=' + glOps.texImage2D + ' useP=' + glOps.useProgram +
        ' texLoad=' + textureLoadCount + ' texErr=' + textureErrorCount, 'info');
      log('Loaded textures: ' + JSON.stringify(loadedTextures));
      log('Failed textures: ' + JSON.stringify(failedTextures));
      poolStatus();
    }

    let startTime;

    // ===== MAIN =====
    window.__LIVE2D_CDN_PATH__ = '/live2d-api/';
    const BASE = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main/';

    function loadExternalResource(url, type) {
      return new Promise((resolve, reject) => {
        let tag;
        if (type === 'css') { tag = document.createElement('link'); tag.rel = 'stylesheet'; tag.href = url; }
        else { tag = document.createElement('script'); tag.src = url; }
        tag.onload = () => { log(type.toUpperCase() + ' loaded: ' + url.split('/').pop()); resolve(url); };
        tag.onerror = () => reject(new Error('Failed: ' + url));
        document.head.appendChild(tag);
      });
    }

    async function main() {
      startTime = Date.now();
      try {
        // ===== SEQUENTIAL LOADING =====
        log('=== Step 1/4: CSS ===', 'section');
        await loadExternalResource(BASE + 'waifu.css', 'css');

        log('=== Step 2/4: Cubism Core ===', 'section');
        await loadExternalResource(BASE + 'Core/live2dcubismcore.js', 'js');
        await new Promise(r => setTimeout(r, 200));

        log('=== Step 3/4: Live2D SDK ===', 'section');
        await loadExternalResource(BASE + 'live2d-sdk.js', 'js');

        let waited = 0;
        while (!window.live2d && waited < 15000) {
          await new Promise(r => setTimeout(r, 100)); waited += 100;
        }
        if (!window.live2d) { log('SDK TIMEOUT', 'err'); return; }
        log('=== SDK ready ===', 'section');

        log('=== Step 4/4: waifu-tips.js ===', 'section');
        await loadExternalResource(BASE + 'waifu-tips.js', 'js');

        // ===== Quick: verify model3.json is fetchable =====
        log('=== Quick model3.json check ===', 'section');
        try {
          const resp = await fetch('/live2d-api/model/teto/teto.model3.json');
          const text = await resp.text();
          const j = JSON.parse(text);
          log('HEAD: model3.json status=' + resp.status + ' textures=' + j.FileReferences.Textures.length + ' moc=' + j.FileReferences.Moc);
        } catch(e) {
          log('HEAD: model3.json failed: ' + e.message, 'err');
        }

        // ===== Init widget =====
        log('=== Calling initWidget ===', 'section');
        localStorage.setItem('modelId', '0');
        localStorage.setItem('modelTexturesId', '0');

        initWidget({
          waifuPath: BASE + 'waifu-tips.json',
          cdnPath: '/live2d-api/',
          homePath: 'https://kioshiroi.github.io/',
          tools: ['hitokoto', 'express', 'photo', 'info', 'quit'],
          dragEnable: true, dragDirection: ['x', 'y'], switchType: 'order'
        });
        log('initWidget() called — waiting for SDK to load model...');

        // ===== Monitoring =====
        // Periodic status every 2s for 30s
        for (let i = 2; i <= 30; i += 2) {
          setTimeout(() => {
            periodicStatus();
            if (i % 6 === 0) snapshotCanvas('+' + i + 's');
          }, i * 1000);
        }

        // Final summary at +35s
        setTimeout(() => {
          periodicStatus();
          snapshotCanvas('+35s');
          log('=== Final Summary ===', 'section');
          log('GL ops: ' + JSON.stringify(glOps), 'info');
          log('Textures loaded: ' + loadedTextures.length + ' ' + JSON.stringify(loadedTextures));
          log('Textures failed: ' + failedTextures.length + ' ' + JSON.stringify(failedTextures));
          log('Fetch log (' + fetchLog.length + ' entries):');
          fetchLog.forEach(e => log('  ' + e.file + ' [' + e.status + ' ' + e.size + 'B ' + e.dur + 'ms]', e.status >= 400 ? 'err' : 'sdk'));
        }, 35000);

      } catch(e) {
        log('FATAL: ' + e.message + '\n' + e.stack, 'err');
      }
    }
    main();
  </script>
</body>
</html>
