<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live2D Test v12 — Direct Moc3 Parse Test</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f5f5f5; min-height: 120vh; }
    #log { padding: 10px; margin: 10px 0; border-radius: 4px; background: #fff; border: 1px solid #ddd; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #0074d9; } .warn { color: #ff851b; } .section { color: #b10dc9; font-weight: bold; } .sdk { color: #2ECC40; }
    #waifu { bottom: 0 !important; right: 0 !important; left: auto !important; }
    #snapshot { margin: 10px 0; }
    #snapshot img { border: 2px solid #333; max-width: 300px; background: #fff; }
  </style>
</head>
<body>
  <h2>Live2D Test v12 — Direct Moc3 Parse Test</h2>
  <div id="log">Loading...</div>
  <div id="snapshot"><strong>Canvas Snapshot: </strong></div>

  <script>
    const _origLog = console.log.bind(console);
    const _origError = console.error.bind(console);
    const _origWarn = console.warn.bind(console);

    const logEl = document.getElementById('log');
    let logLines = 0;
    function log(msg, cls) {
      if (++logLines > 800) {
        const lines = logEl.innerHTML.split('\n');
        logEl.innerHTML = lines.slice(-300).join('\n');
      }
      const safe = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      logEl.innerHTML += `<span class="${cls || 'ok'}">[${((Date.now()-startTime)/1000).toFixed(3)}s] ${safe}</span>\n`;
      _origLog(msg);
      logEl.scrollTop = logEl.scrollHeight;
    }

    const myPrefixes = ['SNAP','IMG_LOAD','IMG_ERR','FETCH','STATUS','===','WINDOW','UNHANDLED','TEX_','GLHOOK',
      'CORE_','MOC_PARSE','MODEL_PARSE','DIRECT_'];

    console.log = function() {
      const msg = Array.from(arguments).join(' ');
      if (msg && !myPrefixes.some(p => msg.startsWith(p))) {
        log('SDK: ' + msg, 'sdk');
      }
      return _origLog.apply(console, arguments);
    };
    console.error = function(){ log('SDK_ERR: ' + Array.from(arguments).join(' '), 'err'); _origError(...arguments); };
    console.warn  = function(){ log('SDK_WARN: ' + Array.from(arguments).join(' '), 'warn'); _origWarn(...arguments); };

    window.addEventListener('error', e => log('WINDOW_ERROR: ' + e.message + ' @ ' + (e.filename||'?').split('/').pop() + ':' + e.lineno, 'err'));
    window.addEventListener('unhandledrejection', e => log('UNHANDLED_REJECTION: ' + (e.reason?.message||e.reason), 'err'));

    // ===== Fetch interceptor =====
    const _origFetch = window.fetch;
    let rawMoc3Buffer = null; // capture moc3 buffer for direct parsing
    const fetchLog = [];
    window.fetch = function(url, opts) {
      let urlStr = (url instanceof Request) ? url.url : String(url);
      if (urlStr.includes('live2d') || urlStr.includes('.moc3') || urlStr.includes('model3') || urlStr.includes('physics3') || urlStr.includes('cdi3') || urlStr.includes('texture_') || urlStr.includes('waifu-tips')) {
        let start = Date.now();
        const fname = decodeURIComponent(urlStr.split('?')[0].split('/').pop());
        const isMoc3 = fname.includes('.moc3');

        return _origFetch.call(window, url, opts).then(resp => {
          const cl = resp.headers.get('content-length') || '?';
          const ce = resp.headers.get('content-encoding') || 'none';
          const dur = Date.now()-start;
          fetchLog.push({ file: fname, status: resp.status, size: cl, dur, ce });

          if (isMoc3 && resp.ok) {
            return resp.clone().arrayBuffer().then(buf => {
              rawMoc3Buffer = buf;
              log('FETCH [' + resp.status + ' ' + cl + 'B ce=' + ce + ' ' + dur + 'ms] ' + fname + ' buf=' + buf.byteLength + 'B', 'ok');
              return resp;
            });
          }
          log('FETCH [' + resp.status + ' ' + cl + 'B ce=' + ce + ' ' + dur + 'ms] ' + fname, resp.ok ? 'ok' : 'err');
          return resp;
        }).catch(err => { log('FETCH_ERR: ' + fname + ' ' + err.message, 'err'); throw err; });
      }
      return _origFetch.call(window, url, opts);
    };

    // ===== Image hook =====
    let textureLoadCount = 0;
    let textureErrorCount = 0;
    const loadedTextures = [];
    const failedTextures = [];

    const _origImage = window.Image;
    window.Image = function() {
      const img = new _origImage();
      const _origSetSrc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
      let srcValue = '';
      let fname = '';

      const _addEL = img.addEventListener.bind(img);
      img.addEventListener = function(evt, fn, opts) {
        if (evt === 'load') {
          const origFn = fn;
          fn = function(e) {
            if (fname && fname.includes('texture_')) { textureLoadCount++; loadedTextures.push(fname); }
            return origFn.call(this, e);
          };
        }
        if (evt === 'error') {
          const origFn = fn;
          fn = function(e) {
            if (fname && fname.includes('texture_')) { textureErrorCount++; failedTextures.push(fname); }
            return origFn.call(this, e);
          };
        }
        return _addEL.call(this, evt, fn, opts);
      };

      Object.defineProperty(img, 'src', {
        get: function() { return srcValue; },
        set: function(val) {
          srcValue = val;
          if (val) { fname = decodeURIComponent(val.split('?')[0].split('/').pop()); }
          _origSetSrc.set.call(this, val);
        },
        configurable: true, enumerable: true
      });
      return img;
    };

    // ===== GL hooks =====
    let glOps = { texImage2D: 0, drawElements: 0, clear: 0, createTexture: 0 };
    let glRef = null;
    let glHooked = false;

    const origGetContext = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function(type, attrs) {
      if (this.id === 'live2d' && (type === 'webgl2' || type === 'webgl')) {
        attrs = attrs || {};
        attrs.preserveDrawingBuffer = true;
      }
      const ctx = origGetContext.call(this, type, attrs);
      if (this.id === 'live2d' && ctx && !glHooked) {
        glHooked = true; glRef = ctx;
        const gl = ctx;
        ['texImage2D','drawElements','clear','useProgram','createTexture'].forEach(name => {
          const orig = gl[name].bind(gl);
          gl[name] = function() { glOps[name] = (glOps[name]||0)+1; return orig.apply(gl, arguments); };
        });
      }
      return ctx;
    };

    function snapshotCanvas(label) {
      const canvas = document.getElementById('live2d');
      if (!canvas) return;
      try {
        if (glRef && !glRef.isContextLost()) {
          glRef.bindFramebuffer(glRef.FRAMEBUFFER, null);
          const px = new Uint8Array(4);
          let found = false;
          for (let y = 0; y < canvas.height && !found; y += 7) {
            for (let x = 0; x < canvas.width && !found; x += 7) {
              glRef.readPixels(x, y, 1, 1, glRef.RGBA, glRef.UNSIGNED_BYTE, px);
              if (px[0] || px[1] || px[2] || px[3]) {
                log('SNAP_PIXEL at (' + x + ',' + y + ') RGBA(' + px.join(',') + ') ✓', 'ok');
                found = true;
              }
            }
          }
          if (!found) log('SNAP: all pixels zero', 'warn');
        }
        const dataUrl = canvas.toDataURL('image/png');
        const snapshotEl = document.getElementById('snapshot');
        snapshotEl.innerHTML = '<strong>' + label + ' (' + Math.round(dataUrl.length/1024) + 'KB): </strong><br><img src="' + dataUrl + '" style="max-width:300px">';
        log('snapshot taken: ' + label, 'info');
      } catch(e) { log('snapshot err: ' + e.message, 'err'); }
    }

    function periodicStatus() {
      log('STATUS: drawE=' + glOps.drawElements + ' createT=' + glOps.createTexture + ' texImg=' + glOps.texImage2D +
        ' texLoad=' + textureLoadCount + ' texErr=' + textureErrorCount, 'info');
    }

    // ===== DIRECT MOC3 PARSE TEST =====
    function testMocParsing(buf, label) {
      log('=== Direct moc3 parse test (' + label + ') ===', 'section');

      // Check if Live2DCubismCore exists
      if (typeof Live2DCubismCore === 'undefined') {
        log('CORE_MISSING: Live2DCubismCore is not defined', 'err');
        return;
      }
      log('CORE_AVAILABLE: Live2DCubismCore keys=' + Object.keys(Live2DCubismCore).join(', '));

      // Check Moc
      if (!Live2DCubismCore.Moc) {
        log('CORE_MISSING: Live2DCubismCore.Moc not found', 'err');
        return;
      }

      // Try different API signatures
      log('CORE_Moc methods: ' + Object.keys(Live2DCubismCore.Moc).join(', '));
      log('CORE_Moc prototype: ' + (Live2DCubismCore.Moc.prototype ? Object.getOwnPropertyNames(Live2DCubismCore.Moc.prototype).join(', ') : 'none'));

      // Try fromArrayBuffer
      if (typeof Live2DCubismCore.Moc.fromArrayBuffer === 'function') {
        try {
          log('MOC_PARSE: calling fromArrayBuffer(' + buf.byteLength + ' bytes)...');
          const moc = Live2DCubismCore.Moc.fromArrayBuffer(buf);
          if (moc) {
            log('MOC_PARSE: SUCCESS! moc object created ✓', 'ok');
            // Check model count
            if (Live2DCubismCore.Moc.prototype) {
              log('MOC_PARSE: moc keys=' + Object.keys(moc).join(', '));
            }
            return moc;
          } else {
            log('MOC_PARSE: returned null/falsy', 'err');
          }
        } catch(e) {
          log('MOC_PARSE: fromArrayBuffer threw: ' + e.message, 'err');
        }
      }

      // Try constructor
      if (typeof Live2DCubismCore.Moc === 'function') {
        try {
          log('MOC_PARSE: calling new Moc(arrayBuffer)...');
          const moc = new Live2DCubismCore.Moc(buf);
          if (moc) {
            log('MOC_PARSE: constructor SUCCESS! ✓', 'ok');
            return moc;
          }
        } catch(e) {
          log('MOC_PARSE: constructor threw: ' + e.message, 'err');
        }
      }

      // Try create
      if (Live2DCubismCore.Moc.create) {
        try {
          log('MOC_PARSE: calling Moc.create(buf)...');
          const moc = Live2DCubismCore.Moc.create(buf);
          if (moc) {
            log('MOC_PARSE: create() SUCCESS! ✓', 'ok');
            return moc;
          }
        } catch(e) {
          log('MOC_PARSE: create() threw: ' + e.message, 'err');
        }
      }

      log('MOC_PARSE: all attempts failed', 'err');
      return null;
    }

    // Verify moc3 buffer magic bytes
    function verifyMocBytes(buf) {
      if (buf.byteLength < 4) return false;
      const dv = new DataView(buf);
      const magic = dv.getUint32(0, false);
      log('MOC_BYTES: size=' + buf.byteLength + 'B magic=0x' + magic.toString(16).toUpperCase(), magic === 0x4D4F4333 ? 'ok' : 'err');
      return magic === 0x4D4F4333;
    }

    let startTime;

    // ===== MAIN =====
    window.__LIVE2D_CDN_PATH__ = '/live2d-api/';
    const BASE = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main/';

    function loadExternalResource(url, type) {
      return new Promise((resolve, reject) => {
        let tag;
        if (type === 'css') { tag = document.createElement('link'); tag.rel = 'stylesheet'; tag.href = url; }
        else { tag = document.createElement('script'); tag.src = url; }
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(new Error('Failed: ' + url));
        document.head.appendChild(tag);
      });
    }

    async function main() {
      startTime = Date.now();
      try {
        // ===== SEQUENTIAL LOADING =====
        log('=== Loading CSS ===', 'section');
        await loadExternalResource(BASE + 'waifu.css', 'css');

        log('=== Loading Cubism Core ===', 'section');
        await loadExternalResource(BASE + 'Core/live2dcubismcore.js', 'js');
        await new Promise(r => setTimeout(r, 200));

        // Core should be available now
        log('=== Checking Live2DCubismCore ===', 'section');
        if (typeof Live2DCubismCore !== 'undefined') {
          log('CORE_LOADED: version=' + Live2DCubismCore.Version);
          log('CORE_KEYS: ' + JSON.stringify(Object.keys(Live2DCubismCore)));
          if (Live2DCubismCore.Moc) {
            log('CORE_Moc: ' + JSON.stringify(Object.keys(Live2DCubismCore.Moc)));
            // Check if fromArrayBuffer is defined
            const mSig = typeof Live2DCubismCore.Moc.fromArrayBuffer;
            log('CORE_Moc.fromArrayBuffer type=' + mSig);
          }
        } else {
          log('CORE_MISSING: Live2DCubismCore undefined', 'err');
        }

        log('=== Loading Live2D SDK ===', 'section');
        await loadExternalResource(BASE + 'live2d-sdk.js', 'js');

        let waited = 0;
        while (!window.live2d && waited < 15000) {
          await new Promise(r => setTimeout(r, 100)); waited += 100;
        }
        if (!window.live2d) { log('SDK TIMEOUT', 'err'); return; }
        log('=== SDK ready ===', 'section');

        log('=== Loading waifu-tips.js ===', 'section');
        await loadExternalResource(BASE + 'waifu-tips.js', 'js');

        // ===== Init widget =====
        log('=== Calling initWidget ===', 'section');
        localStorage.setItem('modelId', '0');
        localStorage.setItem('modelTexturesId', '0');

        initWidget({
          waifuPath: BASE + 'waifu-tips.json',
          cdnPath: '/live2d-api/',
          homePath: 'https://kioshiroi.github.io/',
          tools: ['hitokoto', 'express', 'photo', 'info', 'quit'],
          dragEnable: true, dragDirection: ['x', 'y'], switchType: 'order'
        });
        log('initWidget() called');

        // ===== Wait for moc3 to be downloaded, then test parsing =====
        // The SDK will fetch moc3 internally. We capture it via fetch interceptor.
        // Wait up to 5s for rawMoc3Buffer to be populated
        let mocWait = 0;
        while (!rawMoc3Buffer && mocWait < 10000) {
          await new Promise(r => setTimeout(r, 200)); mocWait += 200;
        }

        if (rawMoc3Buffer) {
          log('=== Moc3 buffer captured (' + rawMoc3Buffer.byteLength + ' bytes) ===', 'section');
          verifyMocBytes(rawMoc3Buffer);
          testMocParsing(rawMoc3Buffer, 'SDK-fetched');

          // Also try fetching moc3 directly ourselves
          log('=== Direct moc3 fetch (bypass SDK) ===', 'section');
          try {
            const resp = await fetch('/live2d-api/model/teto/重音テト.moc3');
            const dirBuf = await resp.arrayBuffer();
            log('DIRECT_FETCH: ' + dirBuf.byteLength + ' bytes, status=' + resp.status);
            verifyMocBytes(dirBuf);
            testMocParsing(dirBuf, 'direct-fetch');
          } catch(e) {
            log('DIRECT_FETCH failed: ' + e.message, 'err');
          }
        } else {
          log('MOC3_TIMEOUT: rawMoc3Buffer never populated after 10s', 'err');
        }

        // ===== Monitoring =====
        for (let i = 2; i <= 30; i += 2) {
          setTimeout(() => {
            periodicStatus();
            if (i % 8 === 0) snapshotCanvas('+' + i + 's');
          }, i * 1000);
        }

        // Final summary
        setTimeout(() => {
          periodicStatus();
          snapshotCanvas('+35s');
          log('=== Final Summary ===', 'section');
          log('GL ops: ' + JSON.stringify(glOps), 'info');
          log('Loaded textures: ' + JSON.stringify(loadedTextures));
          log('Fetch log:');
          fetchLog.forEach(e => log('  ' + e.file + ' [' + e.status + ' ' + e.size + 'B ' + e.dur + 'ms ce=' + e.ce + ']', e.status >= 400 ? 'err' : 'sdk'));
        }, 35000);

      } catch(e) {
        log('FATAL: ' + e.message + '\n' + e.stack, 'err');
      }
    }
    main();
  </script>
</body>
</html>
