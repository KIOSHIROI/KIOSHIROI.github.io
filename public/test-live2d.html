<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live2D Test v3 — GL Intercept</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; background: #f5f5f5; min-height: 120vh; }
    #log { padding: 10px; margin: 10px 0; border-radius: 4px; background: #fff; border: 1px solid #ddd; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 65vh; overflow-y: auto; }
    .ok { color: green; } .err { color: red; } .info { color: #0074d9; } .warn { color: #ff851b; } .section { color: #b10dc9; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Live2D Test v3 — WebGL Interception</h2>
  <div id="log">Loading...</div>

  <script>
    const logEl = document.getElementById('log');
    function log(msg, cls) {
      const safe = String(msg).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      logEl.innerHTML += `<span class="${cls || 'ok'}">[${new Date().toISOString().slice(11,23)}] ${safe}</span>\n`;
      console.log(msg);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Intercept ALL console output
    const _origError = console.error, _origWarn = console.warn;
    console.error = function(){ log('🔴 ' + Array.from(arguments).join(' '), 'err'); _origError.apply(console, arguments); };
    console.warn  = function(){ log('🟡 ' + Array.from(arguments).join(' '), 'warn'); _origWarn.apply(console, arguments); };

    // Intercept fetch for model files
    const _origFetch = window.fetch;
    window.fetch = function(url, opts) {
      let urlStr = (url instanceof Request) ? url.url : String(url);
      if (urlStr.includes('live2d') || urlStr.includes('.moc3') || urlStr.includes('model3') || urlStr.includes('motion3') || urlStr.includes('exp3') || urlStr.includes('texture_')) {
        let start = Date.now();
        return _origFetch.call(window, url, opts).then(resp => {
          log('FETCH [' + resp.status + ' ' + (Date.now()-start) + 'ms] ' + urlStr.split('/').pop(), resp.ok?'ok':'err');
          return resp;
        }).catch(err => { log('FETCH ERR: ' + err.message, 'err'); throw err; });
      }
      return _origFetch.call(window, url, opts);
    };

    // ========== GL OPERATION COUNTING (on #live2d canvas) ==========
    let glOps = { texImage2D: 0, drawElements: 0, drawArrays: 0, clear: 0, uniformMatrix4fv: 0, useProgram: 0, texParameteri: 0, createTexture: 0, bindFramebuffer: 0, bindTexture: 0, bufferData: 0, enableVertexAttribArray: 0 };
    let lastFB = '(none)';
    let fbHistory = [];
    let glHooked = false;

    function hookCanvasGL() {
      const canvas = document.getElementById('live2d');
      if (!canvas) return setTimeout(hookCanvasGL, 500);

      // Intercept getContext to hook operations AFTER SDK creates GL context
      const origGetContext = HTMLCanvasElement.prototype.getContext;
      HTMLCanvasElement.prototype.getContext = function(type, attrs) {
        const ctx = origGetContext.call(this, type, attrs);
        if (this.id === 'live2d' && ctx && !glHooked) {
          glHooked = true;
          log('=== Hooking GL operations on #live2d ===', 'section');
          const gl = ctx;
          // Wrap key GL functions
          const origFns = {};
          for (const name of ['texImage2D','drawElements','drawArrays','clear','useProgram','uniformMatrix4fv','bufferData','enableVertexAttribArray']) {
            origFns[name] = gl[name].bind(gl);
            gl[name] = function() {
              glOps[name] = (glOps[name] || 0) + 1;
              return origFns[name].apply(gl, arguments);
            };
          }
          // Special handling for bindFramebuffer to track FB binding
          origFns.bindFramebuffer = gl.bindFramebuffer.bind(gl);
          gl.bindFramebuffer = function(target, fb) {
            glOps.bindFramebuffer++;
            lastFB = fb === null ? 'null(default)' : ('FB#' + (fb ? 'obj' : '???'));
            if (fbHistory.length < 20) fbHistory.push(lastFB);
            return origFns.bindFramebuffer.call(gl, target, fb);
          };
          // Track createTexture
          origFns.createTexture = gl.createTexture.bind(gl);
          gl.createTexture = function() {
            glOps.createTexture++;
            return origFns.createTexture();
          };
          // Track bindTexture
          origFns.bindTexture = gl.bindTexture.bind(gl);
          gl.bindTexture = function() {
            glOps.bindTexture++;
            return origFns.bindTexture.apply(gl, arguments);
          };
          // Also check for getError periodically
          setInterval(() => {
            if (gl.isContextLost()) { log('!!! GL CONTEXT LOST !!!', 'err'); return; }
            const err = gl.getError();
            if (err !== gl.NO_ERROR && err !== 0) {
              const names = { 1280: 'INVALID_ENUM', 1281: 'INVALID_VALUE', 1282: 'INVALID_OPERATION', 1285: 'OUT_OF_MEMORY', 1286: 'INVALID_FRAMEBUFFER_OPERATION' };
              log(`GL Error: ${names[err]||err}`, 'err');
            }
          }, 2000);
          log('GL hooks installed ✓');
        }
        return ctx;
      };
    }

    // Run baseline WebGL rendering test on a SEPARATE canvas
    function testGLRendering() {
      const testCanvas = document.createElement('canvas');
      testCanvas.width = 100; testCanvas.height = 100;
      testCanvas.style.position = 'fixed'; testCanvas.style.top = '10px'; testCanvas.style.right = '10px';
      testCanvas.style.border = '2px solid red'; testCanvas.style.zIndex = '99999';
      document.body.appendChild(testCanvas);

      const gl = testCanvas.getContext('webgl2') || testCanvas.getContext('webgl');
      if (!gl) { log('BASELINE GL TEST: No context', 'err'); return; }

      // Simple triangle shaders
      const vs = gl.createShader(gl.VERTEX_SHADER);
      gl.shaderSource(vs, 'attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }');
      gl.compileShader(vs);
      if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) { log('BASELINE: VS compile error: ' + gl.getShaderInfoLog(vs), 'err'); return; }

      const fs = gl.createShader(gl.FRAGMENT_SHADER);
      gl.shaderSource(fs, 'precision mediump float; void main(){ gl_FragColor=vec4(1,0,0,1); }');
      gl.compileShader(fs);
      if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) { log('BASELINE: FS compile error: ' + gl.getShaderInfoLog(fs), 'err'); return; }

      const prog = gl.createProgram();
      gl.attachShader(prog, vs); gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { log('BASELINE: Program link error: ' + gl.getProgramInfoLog(prog), 'err'); return; }

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, 0,1]), gl.STATIC_DRAW);
      const posLoc = gl.getAttribLocation(prog, 'p');
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
      gl.useProgram(prog);
      gl.clearColor(0, 0, 1, 1); gl.clear(gl.COLOR_BUFFER_BIT);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      const err = gl.getError();
      const px = new Uint8Array(4);
      gl.readPixels(50, 50, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
      log('BASELINE GL TEST: err=' + err + ' centerPixel=RGBA(' + px.join(',') + ') [red triangle on blue bg]',
          px[0] > 200 ? 'ok' : 'err');
      gl.getExtension('WEBGL_lose_context')?.loseContext();
      testCanvas.style.display = 'none';
    }

    // ========== Scan pixels and log GL ops ==========
    window._pixelFound = false;
    function fullCheck(label) {
      if (window._pixelFound) return;
      const canvas = document.getElementById('live2d');
      if (!canvas) { log(label + ': no canvas', 'err'); return; }
      try {
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl || gl.isContextLost()) { log(label + ': no GL / context lost', 'err'); return; }
        const px = new Uint8Array(4);
        for (let sy = 0; sy < canvas.height; sy += 40) {
          for (let sx = 0; sx < canvas.width; sx += 40) {
            gl.readPixels(sx, sy, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
            if (px[0] || px[1] || px[2] || px[3]) {
              log(label + ': PIXEL at (' + sx + ',' + sy + ') RGBA(' + px.join(',') + ') ✓', 'ok');
              window._pixelFound = true;
              return;
            }
          }
        }
        log(label + ': ALL pixels zero ❌ GL_ops: ' + JSON.stringify(glOps), 'err');
      } catch(e) {
        log(label + ': error=' + e.message, 'err');
      }
    }

    function checkGL(label) {
      const canvas = document.getElementById('live2d');
      if (!canvas) { log(label + ': no canvas', 'err'); return; }
      try {
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (!gl) { log(label + ': no GL', 'err'); return; }
        log(label + ': VP=' + gl.getParameter(gl.VIEWPORT).join('x') +
          ' lost=' + gl.isContextLost() + ' texSize=' + gl.getParameter(gl.MAX_TEXTURE_SIZE) +
          ' ops=' + JSON.stringify(glOps));
      } catch(e) { log(label + ': err=' + e.message, 'err'); }
    }

    // ========== MAIN ==========
    window.__LIVE2D_CDN_PATH__ = '/live2d-api/';
    const BASE = 'https://cdn.jsdelivr.net/gh/letere-gzj/live2d-widget-v3@main/';

    function loadExternalResource(url, type) {
      return new Promise((resolve, reject) => {
        let tag;
        if (type === 'css') { tag = document.createElement('link'); tag.rel = 'stylesheet'; tag.href = url; }
        else { tag = document.createElement('script'); tag.src = url; }
        tag.onload = () => resolve(url);
        tag.onerror = () => reject(new Error('Failed: ' + url));
        document.head.appendChild(tag);
      });
    }

    async function main() {
      try {
        log('=== Loading CDN ===', 'section');
        await loadExternalResource(BASE + 'waifu.css', 'css');
        await loadExternalResource(BASE + 'Core/live2dcubismcore.js', 'js');
        await loadExternalResource(BASE + 'live2d-sdk.js', 'js');
        log('SDK loaded ✓ live2d=' + typeof window.live2d);
        await loadExternalResource(BASE + 'waifu-tips.js', 'js');
        log('Widget loaded ✓ initWidget=' + typeof window.initWidget);

        // Install canvas GL hooks before initWidget creates canvas
        hookCanvasGL();

        log('=== Calling initWidget ===', 'section');
        localStorage.setItem('modelId', '0');
        localStorage.setItem('modelTexturesId', '0');

        initWidget({
          waifuPath: BASE + 'waifu-tips.json',
          cdnPath: '/live2d-api/',
          homePath: 'https://kioshiroi.github.io/',
          tools: ['hitokoto', 'express', 'photo', 'info', 'quit'],
          dragEnable: true, dragDirection: ['x', 'y'], switchType: 'order'
        });
        log('initWidget() called ✓');

        // Schedule checks
        setTimeout(() => testGLRendering(), 3000);
        setTimeout(() => checkGL('+4s'), 4000);
        setTimeout(() => { checkGL('+6s'); fullCheck('+6s'); }, 6000);
        setTimeout(() => { checkGL('+10s'); fullCheck('+10s'); }, 10000);
        setTimeout(() => {
          checkGL('+15s');
          fullCheck('+15s');
          log('=== Final GL ops: ' + JSON.stringify(glOps) + ' ===', 'section');
          log('FB history: ' + fbHistory.join(' → '), 'info');
          log('Last FB: ' + lastFB, 'info');
          const waifu = document.getElementById('waifu');
          if (waifu) {
            const s = getComputedStyle(waifu);
            log('waifu: bottom=' + s.bottom + ' display=' + s.display + ' rect=' + JSON.stringify(waifu.getBoundingClientRect()));
          }
          log('--- If ops show texImage2D=0, textures never uploaded. If drawElements=0, model never rendered. ---', 'section');
        }, 15000);

      } catch(e) {
        log('FATAL: ' + e.message + '\n' + e.stack, 'err');
      }
    }
    main();
  </script>
</body>
</html>
